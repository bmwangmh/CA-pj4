[env:sipeed-longan-nano]
; The official gd32v packages were pulled from the PlatformIO registry (403).
; This unofficial fork rehosts the macOS toolchain + framework on GitHub.
; (On Linux/Windows use: platform = https://github.com/sipeed/platform-gd32v.git)
